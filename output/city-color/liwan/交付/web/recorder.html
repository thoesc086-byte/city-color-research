<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>视频录制</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #000;
}

.app {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ========== 状态栏 ========== */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 0 16px;
}
.status-time {
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.status-icons {
  position: absolute;
  right: 16px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.status-icons svg { fill: #fff; }

/* ========== 顶部工具栏 ========== */
.top-bar {
  position: absolute;
  top: 44px; left: 0; right: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
}
.top-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.top-btn:active { background: rgba(255,255,255,0.3); }
.top-btn svg { fill: #fff; }

.top-right-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.top-btn-text {
  height: 32px;
  padding: 0 12px;
  border-radius: 16px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

/* ========== 预览区域 ========== */
.preview-area {
  flex: 1;
  position: relative;
  background: #1a1a2e;
  overflow: hidden;
}
.preview-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ========== 底部控制区 ========== */
.bottom-controls {
  position: absolute;
  bottom: 100px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  z-index: 100;
}

/* 变焦按钮 */
.zoom-bar {
  position: absolute;
  bottom: 170px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 4px;
  z-index: 100;
}
.zoom-btn {
  width: 40px; height: 32px;
  border-radius: 16px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.zoom-btn.active {
  background: #fff;
  color: #1a1a1a;
}

/* 侧边按钮 */
.side-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  cursor: pointer;
}
.side-btn svg { stroke: #fff; fill: none; }

/* 录制按钮 */
.record-btn-wrap {
  position: relative;
  width: 80px; height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.record-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: #ff2d55;
  border: 4px solid rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.record-btn.recording {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: #ff2d55;
  border: none;
}
.record-btn:active { transform: scale(0.95); }

/* 录制按钮外圈 */
.record-ring {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.3);
  pointer-events: none;
}

/* ========== 底部模式栏 ========== */
.mode-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 88px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  padding: 0 8px;
  z-index: 100;
}
.mode-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 100%;
  cursor: pointer;
  border-radius: 12px;
  transition: background 0.2s;
  padding: 8px 0;
}
.mode-item:active { background: rgba(255,255,255,0.1); }
.mode-item.active { background: rgba(255,255,255,0.15); }
.mode-item.active .mode-icon-wrap {
  border-color: #fff;
}
.mode-icon-wrap {
  width: 40px; height: 40px;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
}
.mode-icon-wrap svg {
  width: 22px; height: 22px;
  stroke: #fff;
  fill: none;
}
.mode-label {
  color: rgba(255,255,255,0.7);
  font-size: 11px;
}
.mode-item.active .mode-label {
  color: #fff;
  font-weight: 600;
}

/* 下拉箭头 */
.chevron-down {
  width: 24px; height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 4px;
}
.chevron-down svg { stroke: #fff; fill: none; }

/* ========== 录制计时 ========== */
.record-timer {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  color: #ff2d55;
  font-size: 16px;
  font-weight: 600;
  display: none;
  align-items: center;
  gap: 6px;
  z-index: 100;
}
.record-timer.show { display: flex; }
.timer-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff2d55;
  animation: blink 1s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ========== 对焦框 ========== */
.focus-box {
  position: absolute;
  width: 80px; height: 80px;
  border: 1.5px solid #ffcc00;
  border-radius: 4px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.focus-box.show { opacity: 1; }
.focus-box::before, .focus-box::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-color: #ffcc00;
  border-style: solid;
}
.focus-box::before {
  top: -1px; left: -1px;
  border-width: 2px 0 0 2px;
}
.focus-box::after {
  bottom: -1px; right: -1px;
  border-width: 0 2px 2px 0;
}
</style>
</head>
<body>

<div class="app">
  <!-- 状态栏 -->
  <div class="status-bar">
    <span class="status-time" id="statusTime">19:00</span>
    <div class="status-icons">
      <!-- 信号 -->
      <svg width="18" height="12" viewBox="0 0 18 12"><rect x="12" y="0" width="3" height="12" rx="0.5"/><rect x="8" y="3" width="3" height="9" rx="0.5"/><rect x="4" y="6" width="3" height="6" rx="0.5"/><rect x="0" y="9" width="3" height="3" rx="0.5"/></svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 0L0 8h2l6-6 6 6h2L8 0zm0 4L3 9h2l3-3 3 3h2L8 4z"/><circle cx="8" cy="11" r="1"/></svg>
      <!-- 电池 -->
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" fill="none" stroke="#fff" stroke-width="1"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="#fff"/><rect x="22" y="4" width="2" height="4" rx="1" fill="#fff"/></svg>
    </div>
  </div>

  <!-- 顶部工具栏 -->
  <div class="top-bar">
    <button class="top-btn" id="closeBtn">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 1l14 14M15 1L1 15" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="top-right-group">
      <button class="top-btn" id="flashBtn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </button>
      <button class="top-btn-text" id="ratioBtn">16:9</button>
      <button class="top-btn" id="switchBtn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
    </div>
  </div>

  <!-- 预览区域 -->
  <div class="preview-area" id="previewArea">
    <img class="preview-img" src="bg.jpg" alt="camera preview">
    <div class="focus-box" id="focusBox"></div>
  </div>

  <!-- 录制计时 -->
  <div class="record-timer" id="recordTimer">
    <span class="timer-dot"></span>
    <span id="timerText">00:00</span>
  </div>

  <!-- 变焦按钮 -->
  <div class="zoom-bar">
    <button class="zoom-btn active" data-zoom="1">1x</button>
    <button class="zoom-btn" data-zoom="2">2x</button>
    <button class="zoom-btn" data-zoom="5">5x</button>
  </div>

  <!-- 底部控制区 -->
  <div class="bottom-controls">
    <button class="side-btn" id="gridBtn">
      <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4" stroke-width="1.5"/></svg>
    </button>
    <div class="record-btn-wrap">
      <div class="record-ring"></div>
      <button class="record-btn" id="recordBtn"></button>
    </div>
    <button class="side-btn" id="effectBtn">
      <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="5" cy="5" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/></svg>
    </button>
  </div>

  <!-- 底部模式栏 -->
  <div class="mode-bar">
    <div class="chevron-down">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="mode-item active" data-mode="none">
      <div class="mode-icon-wrap">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="1.5"/></svg>
      </div>
      <span class="mode-label">无特效</span>
    </div>
    <div class="mode-item" data-mode="auto">
      <div class="mode-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h2v-2h-2v2zm0-4h2V7h-2v6z" fill="none" stroke-width="1.5"/></svg>
      </div>
      <span class="mode-label">自动</span>
    </div>
    <div class="mode-item" data-mode="push">
      <div class="mode-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5L12 4z" fill="none" stroke-width="1.5"/></svg>
      </div>
      <span class="mode-label">推进</span>
    </div>
    <div class="mode-item" data-mode="pull">
      <div class="mode-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-5V4H9v8H4l8 8z" fill="none" stroke-width="1.5"/></svg>
      </div>
      <span class="mode-label">拉近</span>
    </div>
    <div class="mode-item" data-mode="left">
      <div class="mode-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 12H4m0 0l6-6m-6 6l6 6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="mode-label">左移</span>
    </div>
  </div>
</div>

<script>
// 更新时间
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('statusTime').textContent = h + ':' + m;
}
updateTime();
setInterval(updateTime, 60000);

// 录制按钮
let isRecording = false;
let recordTimer = null;
let recordSeconds = 0;
const recordBtn = document.getElementById('recordBtn');
const timerEl = document.getElementById('recordTimer');
const timerText = document.getElementById('timerText');

recordBtn.addEventListener('click', () => {
  isRecording = !isRecording;
  if (isRecording) {
    recordBtn.classList.add('recording');
    timerEl.classList.add('show');
    recordSeconds = 0;
    timerText.textContent = '00:00';
    recordTimer = setInterval(() => {
      recordSeconds++;
      const m = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
      const s = String(recordSeconds % 60).padStart(2, '0');
      timerText.textContent = m + ':' + s;
    }, 1000);
  } else {
    recordBtn.classList.remove('recording');
    timerEl.classList.remove('show');
    clearInterval(recordTimer);
  }
});

// 变焦切换
const zoomBtns = document.querySelectorAll('.zoom-btn');
zoomBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    zoomBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// 模式切换
const modeItems = document.querySelectorAll('.mode-item');
modeItems.forEach(item => {
  item.addEventListener('click', () => {
    modeItems.forEach(m => m.classList.remove('active'));
    item.classList.add('active');
  });
});

// 点击预览对焦
const previewArea = document.getElementById('previewArea');
const focusBox = document.getElementById('focusBox');
previewArea.addEventListener('click', (e) => {
  const rect = previewArea.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  focusBox.style.left = (x - 40) + 'px';
  focusBox.style.top = (y - 40) + 'px';
  focusBox.classList.add('show');
  setTimeout(() => focusBox.classList.remove('show'), 1500);
});

// 关闭按钮
document.getElementById('closeBtn').addEventListener('click', () => {
  alert('关闭');
});

// 闪光灯
document.getElementById('flashBtn').addEventListener('click', function() {
  this.style.opacity = this.style.opacity === '0.5' ? '1' : '0.5';
});

// 切换摄像头
document.getElementById('switchBtn').addEventListener('click', () => {
  alert('切换摄像头');
});
</script>

</body>
</html>
